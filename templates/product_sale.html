<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Sale</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #020617;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="container">
    <h2>🛒 Product Sale</h2>

    <form action="/product_sale" method="POST">

        <!-- Product Dropdown -->
        <label>Select Product</label>
        <select name="product_id" required>
            {% for item in items %}
            <option value="{{ item.id }}">
                {{ item.name }} (Stock: {{ item.qty }})
            </option>
            {% endfor %}
        </select>

        <!-- Quantity -->
        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>

        <button type="submit">Submit Sale</button>
    </form>

</div>

</body>
</html>
