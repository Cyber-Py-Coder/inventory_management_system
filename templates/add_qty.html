<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Items</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #020617;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.flash-container {
    margin: 20px;
}

.flash {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 5px;
    color: white;
    font-weight: bold;
}

.top-pos {
position: absolute;
 top: 50px;
 right: 10px;
}

/* Categories */
.flash.success { background-color: #28a745; }
.flash.error { background-color: #dc3545; }
.flash.warning { background-color: #ffc107; color: black; }
</style>
</head>

<body>

<div class="top-pos">
<a style="text-decoration: none; color: skyblue;" href="/Manager_dashboard"><h1>Dashboard</h1></a>
</div>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
    <!-- <h1 style="text-align: center;">{{sale}}</h1> -->
    <h2>🛒 Add quantity</h2>

    <form action="/add_qty" method="POST">

        <!-- Product Dropdown -->
        <label>Products</label>
        <select name="product_id" id="productSelect" required>
            {% for item in items %}
            <option 
                value="{{ item.id }}"
                data-name="{{ item.product_name }}"
                data-price="{{ item.price }}">
                
                {{ item.product_name }} | Stock: {{ item.quantity }} | {{item.section}}
            </option>
            {% endfor %}
        </select>

        <!-- Hidden Fields -->
        <input type="hidden" name="product_name" id="productName">
        <input type="hidden" name="price" id="productPrice">

        <!-- Quantity -->
        <label>Quantity</label>
        <input type="number" name="qty" min="1" required>

        <button type="submit">Add quantity</button>
    </form>
</div>

<script>
    const select = document.getElementById("productSelect");
    const nameField = document.getElementById("productName");
    const priceField = document.getElementById("productPrice");

    function updateHiddenFields() {
        const selected = select.options[select.selectedIndex];
        nameField.value = selected.getAttribute("data-name");
        priceField.value = selected.getAttribute("data-price");
    }

    // Initial run
    updateHiddenFields();

    // On change
    select.addEventListener("change", updateHiddenFields);
</script>

</body>
</html>
